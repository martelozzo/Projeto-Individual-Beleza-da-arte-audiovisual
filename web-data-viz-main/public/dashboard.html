<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="all_style.css">
</head>

<body>
    <header class="header">

        <div class="header_title inter" style="font-size: 2.6rem;" onclick="window.location.href='index.html'" 3>A
            beleza e
            a importância da
            arte audiovisual</div>
        <div class="user inter">
            <p id="pfp" class="pfp_text"></p>
        </div>
        <div class="inter"><button class="sair" onclick=logout()>
                <p>Sair</p>
            </button></div>
    </header>
    <div class="inter titulo_dash">Resultados</div>
    <div class="area_grafs">

        <div class="container_graf_individual">
            <div class="titulo_graf_individual inter">Seu nível é...</div>
            <div class="categoria_individual inter" id="resultado_final"></div>
            <div class="descricao_individual inter" id="acertos_user"></div>
        </div>
        <div class="container_graf_individual">
            <div style="display: flex; justify-content: center; font-size: 2rem; font-weight: 500; padding-bottom: 50px;"
                class="inter">Questões mais erradas por todos</div>
            <div style="display: flex; gap: 30px; justify-content: space-around; align-content: center;">
                <div class="inter container_kpi_questoes"
                    style="display: flex; flex-direction: column; font-size: 3.5rem; font-weight: 500; color: red;" id="top1">
                    <span id="top1_num"></span>
                    <div
                        style="display: flex; justify-content: center; font-size: 1rem; font-weight: 500; color: #666;" id="top1_port">
                        </div>
                </div>
                <div class="inter container_kpi_questoes"
                    style="display: flex; flex-direction: column; font-size: 3.5rem; font-weight: 500; color: orange;" id="top2">
                    <span id="top2_num"></span>
                    <div
                        style="display: flex; justify-content: center; font-size: 1rem; font-weight: 500; color: #666" id="top2_port">
                        </div>
                </div>
                <div class="inter container_kpi_questoes"
                    style="display: flex; flex-direction: column; font-size: 3.5rem; font-weight: 500; color: green;" id="top3">
                     <span id="top3_num"></span>
                    <div
                        style="display: flex; justify-content: center; font-size: 1rem; font-weight: 500; color: #666;" id="top3_port">
                        </div>
                </div>
            </div>
        </div>
    </div>
    <div class="area_grafs">
        <div class="container_graf">
            <div style="display: flex; justify-content: center; font-size: 2rem; padding-bottom: 1rem;" class="inter">
                Média respostas</div>
            <canvas id="chart" style="margin-bottom: 40px;"></canvas>
            <div class="container_button_graf"></div>
        </div>

        <div class="container_graf_kpi" style="justify-content: flex-end;">
            <div class="inter"
                style="display: flex; justify-content: center; font-size: 2rem; padding-bottom: 1rem; align-items: center;">
                Desempenho Geral</div>
            <div class="div_lsk">
                <div class="container_kpi_user">
                    <div class="titulo_kpi inter" style="padding-bottom: 1.5rem;">Usuários participantes</div>
                    <div class="dado_kpi_user inter" id="usuarios_respondidos"></div>
                </div>
                <div class="container_kpi_user">
                    <div class="titulo_kpi inter" style="padding-bottom: 1.5rem;">Nota Média</div>
                    <div class="dado_kpi_user inter" style="color: green;" id="media_usuarios"></div>
                </div>

            </div>
            <div class="div_lsk">
                <div class="container_kpi_user_large">
                    <div class="container_kpi_user_mini">
                        <div class="titulo_kpi_mini inter" style="color: green;">Iniciante (0-4)</div>
                        <div class="dado_kpi_user inter" id="exib_iniciantes"></div>
                        <div class="dado_mini inter" id="num_iniciantes"></div>
                    </div>

                    <div class="container_kpi_user_mini">
                        <div class="titulo_kpi_mini inter" style="color: orange;">Avançado (8-9)</div>
                        <div class="dado_kpi_user inter" id="exib_avancados"></div>
                        <div class="dado_mini inter" id="num_avancados"></div>
                    </div>

                    <div class="container_kpi_user_mini" style="margin-left: 0px;">
                        <div class="titulo_kpi_mini inter" style="color: rgb(188, 182, 0);">Intermediário (5-7)</div>
                        <div class="dado_kpi_user inter" id="exib_intermediarios"></div>
                        <div class="dado_mini inter" id="num_intermediarios"></div>
                    </div>

                    <div class="container_kpi_user_mini" style="margin-left: 0px;">
                        <div class="titulo_kpi_mini inter" style="color: red;">Expert (10)</div>
                        <div class="dado_kpi_user inter" id="exib_experts"></div>
                        <div class="dado_mini inter" id="num_experts"></div>
                    </div>
                </div>

            </div>
        </div>
        <div style="display: flex; justify-content: center; margin: 5rem; width: 100%;">
            <button class="botao" style="display: flex; justify-content: center; height: 5rem; width: 12rem;" onclick="retry()"><p style="display: flex; justify-content: center; align-items: center; font-size: 1.5rem;">Tentar novamente</p></button>
        </div>
    </div>

    </div>

</body>

<script>

    const nome = sessionStorage.NOME_USUARIO;
    const id = sessionStorage.ID_USUARIO;

    let letra_pfp = nome ? nome.charAt(0).toUpperCase() : '?';

    pfp.innerHTML = `${letra_pfp}`

    function retry(){

        const user_id = getUsuarioId()

        if(user_id == undefined){
            window.location.href = `login.html`
            return;
        }

        window.location.href = `quiz.html`

    }

    function logout() {
        sessionStorage.clear();
        window.location.href = `login.html`
    }

    function getUsuarioId() {
        const id = sessionStorage.getItem('ID_USUARIO')
        if (!id) {
            console.warn('Usuário não autenticado.')
            return null
        }
        return parseInt(id)
    }

       async function buscarDados() {
    const resposta = await fetch('/dash_barra/listar');
    const dados = await resposta.json();

    const labels = [], dataA = [], dataB = [], dataC = [], dataD = [];

    for (let i = 0; i < dados.length; i += 4) {
        const a = Number(dados[i].total);
        const b = Number(dados[i + 1].total);
        const c = Number(dados[i + 2].total);
        const d = Number(dados[i + 3].total);
        const total = a + b + c + d;

        labels.push('Q' + dados[i].questao_id);
        dataA.push(total == 0 ? 0 : Math.round(a * 100 / total * 10) / 10);
        dataB.push(total == 0 ? 0 : Math.round(b * 100 / total * 10) / 10);
        dataC.push(total == 0 ? 0 : Math.round(c * 100 / total * 10) / 10);
        dataD.push(total == 0 ? 0 : Math.round(d * 100 / total * 10) / 10);
    }

    meuChart.data.labels = labels;
    meuChart.data.datasets[0].data = dataA;
    meuChart.data.datasets[1].data = dataB;
    meuChart.data.datasets[2].data = dataC;
    meuChart.data.datasets[3].data = dataD;
    meuChart.update();
}


    var meuChart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                { label: 'Opção A', data: [], backgroundColor: '#534AB7' },
                { label: 'Opção B', data: [], backgroundColor: '#1D9E75' },
                { label: 'Opção C', data: [], backgroundColor: '#EF9F27' },
                { label: 'Opção D', data: [], backgroundColor: '#2F7F27' }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    stacked: true,
                    max: 100,
                    ticks: { callback: function (value) { return value + '%'; } }
                },
                y: { stacked: true }
            }
        }
    });

    async function buscarKpi() {

        let retornoKPI = await fetch(`/kpi/listar`);
        let retornoKPI_json = await retornoKPI.json();
        
        console.log(retornoKPI_json[0]);
        

        usuarios_respondidos.innerHTML = `${Math.round(retornoKPI_json[0].usuarios)}`

    }

    async function buscarMedia() {

        let retornoKPI = await fetch('/kpi/media');
        let retornoKPI_json = await retornoKPI.json();
        
        console.log(retornoKPI_json[0]);

        let cor = ``
       

        if(retornoKPI_json[0].media_geral < 5){
            cor = `red`
        }else if(retornoKPI_json[0].media_geral < 7){
            cor = `orange`
        }else{
            cor = `green`
        }


        media_usuarios.innerHTML = `<p style="color: ${cor}">${retornoKPI_json[0].media_geral}</p>`
        
        
    }

 


    async function buscarAcertosUser() {

        const usuarioId = getUsuarioId()

        let retornoKPI = await fetch(`/kpi/acertos?usuario_id=${usuarioId}`);
        let retornoKPI_json = await retornoKPI.json();

        console.log(retornoKPI_json[0].acertos);

         let texto = ``
         let final = ``
         let cor = ``

        if(retornoKPI_json[0].acertos <= 4){
            texto = `Estude mais e tente de novo!`;
            final = `Iniciante`
            cor = `green`
        }else if(retornoKPI_json[0].acertos <= 7){
            texto = `Pode ser melhor, tente de novo!`;
            final = `Intermediário`
            cor = `orange`
        }else if(retornoKPI_json[0].acertos <= 9){
            texto = `Muito bem!`;
            final = `Avançado`
            cor = `rgb(188, 182, 0)`
        }else{
            texto = `Senhor Arte!`;
            final = `Expert`
            cor = `red`
        }

        acertos_user.innerHTML = `Você acertou ${retornoKPI_json[0].acertos} de 10 ! ${texto}`

        resultado_final.innerHTML = `<p style="color: ${cor}">${final}</p>`
    }

    async function buscarMaisErradas() {

        let retornoKPI = await fetch('/kpi/mais_erradas');
        let retornoKPI_json = await retornoKPI.json();
        
        console.log(retornoKPI_json);

        let top_1 = retornoKPI_json[0].questao_id;
        let top_2 = retornoKPI_json[1].questao_id;
        let top_3 = retornoKPI_json[2].questao_id;

        top1_num.innerHTML = `Q${top_1}`;
        top2_num.innerHTML = `Q${top_2}`;
        top3_num.innerHTML = `Q${top_3}`;

        
        
    }

    async function buscarMaisErradasPorcentagem () {

        let retornoKPI = await fetch('/kpi/mais_erradas_porcentagem');
        let dados = await retornoKPI.json();
        
        console.log(dados);
        
        const questao1 = dados[0];
        const questao2 = dados[1];
        const questao3 = dados[2];

        const por1 = Math.round(questao1.total_erros * 100 / questao1.total_respostas);
        const por2 = Math.round(questao2.total_erros * 100 / questao2.total_respostas);
        const por3 = Math.round(questao3.total_erros * 100 / questao3.total_respostas);

        top1_port.innerHTML = `${por1}% de erro`;
        top2_port.innerHTML = `${por2}% de erro`;
        top3_port.innerHTML = `${por3}% de erro`;

    }

    async function categorias_geral () {

        let retornoKPI = await fetch('/kpi/categorias_geral');
        let dados = await retornoKPI.json();
        
        console.log(dados[0].avancados);
        
        const iniciantes = Number(dados[0].iniciante) ;
        const intermediarios = Number(dados[0].intermediario) ;
        const avancados = Number(dados[0].avancado) ;
        const experts = Number(dados[0].expert) ;
        const total = iniciantes + intermediarios + avancados + experts

        const por_iniciantes = Math.round(iniciantes * 100 / total);
        const por_intermediarios = Math.round(intermediarios * 100 / total);
        const por_avancados = Math.round(avancados * 100 / total);
        const por_experts = Math.round(experts * 100 / total);

        exib_iniciantes.innerHTML = `${por_iniciantes}%`;
        exib_intermediarios.innerHTML = `${por_intermediarios}%`;
        exib_avancados.innerHTML = `${por_avancados}%`;
        exib_experts.innerHTML = `${por_experts}%`;

        num_iniciantes.innerHTML = `${iniciantes} usuários`;
        num_intermediarios.innerHTML = `${intermediarios} usuários`;
        num_avancados.innerHTML = `${avancados} usuários`;
        num_experts.innerHTML = `${experts} usuários`;
        

    }

    buscarDados();                      // carrega imediatamente ao abrir a página
    setInterval(buscarDados, 10000);    // e repete a cada 10 segundos
    buscarKpi();     
    setInterval(buscarKpi, 10000);
    buscarMedia();
    setInterval(buscarMedia, 10000);
    window.onload = buscarAcertosUser;
    buscarMaisErradas();
    setInterval(buscarMaisErradas, 10000);
    buscarMaisErradasPorcentagem();
    setInterval(buscarMaisErradasPorcentagem, 10000);
    categorias_geral();
    setInterval(categorias_geral, 10000);


</script>

</html>
