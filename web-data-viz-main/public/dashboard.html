<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="all_style.css">
</head>

<body>
    <header class="header">

        <div class="header_title inter" style="font-size: 2.6rem;" onclick="window.location.href='index.html'" 3>A
            beleza e
            a importância da
            arte audiovisual</div>
        <div class="user inter">
            <p id="pfp"></p>
        </div>
        <div class="inter"><button class="sair" onclick=logout()>
                <p>Sair</p>
            </button></div>
    </header>
    <div class="inter titulo_dash">Resultados</div>
    <div class="area_grafs">
        <div class="container_graf">
            <div style="display: flex; justify-content: center; font-size: 2rem; padding-bottom: 1rem;" class="inter">
                Média respostas</div>
            <canvas id="chart" style="margin-bottom: 40px;"></canvas>
            <div class="container_button_graf"></div>
        </div>

        <div class="container_graf_kpi" style="justify-content: flex-end;">
            <div class="inter"
                style="display: flex; justify-content: center; font-size: 2rem; padding-bottom: 1rem; align-items: center;">
                Desempenho Geral</div>
            <div class="div_lsk">
                <div class="container_kpi_user">
                    <div class="titulo_kpi inter" style="padding-bottom: 1.5rem;">Usuários participantes</div>
                    <div class="dado_kpi_user inter">2500</div>
                </div>
                <div class="container_kpi_user">
                    <div class="titulo_kpi inter" style="padding-bottom: 1.5rem;">Nota Média</div>
                    <div class="dado_kpi_user inter">6.7</div>
                </div>

            </div>
            <div class="div_lsk">
                <div class="container_kpi_user_large">
                    <div class="container_kpi_user_mini">
                        <div class="titulo_kpi_mini inter">Iniciante (0-4)</div>
                        <div class="dado_kpi_user inter">38%</div>
                        <div class="dado_mini inter">560 usuários</div>
                    </div>
                    
                    <div class="container_kpi_user_mini" >
                        <div class="titulo_kpi_mini inter">Avançado (8-9)</div>
                        <div class="dado_kpi_user inter">14%</div>
                        <div class="dado_mini inter">240 usuários</div>
                    </div>

                    <div class="container_kpi_user_mini" style="margin-left: 0px;">
                        <div class="titulo_kpi_mini inter">Intermediário (5-7)</div>
                        <div class="dado_kpi_user inter">41%</div>
                        <div class="dado_mini inter">950 usuários</div>
                    </div>

                    <div class="container_kpi_user_mini" style="margin-left: 0px;">
                        <div class="titulo_kpi_mini inter">Expert (10)</div>
                        <div class="dado_kpi_user inter">7%</div>
                        <div class="dado_mini inter">87 usuários</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    </div>

</body>

<script>


    new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6', 'Q7', 'Q8', 'Q9', 'Q10'],
            datasets: [
                { label: 'Opção A', data: [51, 30, 82], backgroundColor: '#534AB7' },
                { label: 'Opção B', data: [29, 45, 10], backgroundColor: '#1D9E75' },
                { label: 'Opção C', data: [20, 25, 8], backgroundColor: '#EF9F27' },
                { label: 'Opção D', data: [20, 25, 8], backgroundColor: '#2F7F27' }
            ]
        },
        options: {
            indexAxis: 'y', // deixa as barras horizontais
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { stacked: true },
                y: { stacked: true }
            }
        }
    });




</script>

</html>
