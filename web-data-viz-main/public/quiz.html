<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="stylesheet" href="all_style.css">
</head>


<body onload="onloadEsconder()">
  <header class="header">

    <div class="header_title inter" style="font-size: 2.6rem;" onclick="window.location.href='index.html'" 3>A beleza e
      a importância da
      arte audiovisual</div>
    <div class="login inter"><button onclick="window.location.href='login.html'">
        <p>Login</p>
      </button></div>
  </header>
  <div id="pontuacaoEJogo" style="display: flex; height: 100%; width: 100%;">
    <button id="btnIniciarQuiz" onclick="iniciarQuiz()" class="botao" style="display:flex; justify-content: center; align-items: center; height: 4rem; width: 8rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
      <p>INICIAR QUIZ</p>
    </button>

    <div id="jogo" class="questao inter">

      <div id="infoQuestao" class="padding-8" style="display: flex; align-self: flex-start; padding-left: 3rem;">
        <p>Questão atual: <span id="spanNumeroDaQuestaoAtual"></span> de <span id="qtdQuestoes"></span>
          questões.</p>
      </div>

      <div id="perguntaDaQuestaoAtual" class="padding-8" style="">
        <span id="spanQuestaoExibida" class="text-bold inter"></span>
      </div>

      <div id="infoAlternativas" class="padding-8">
        <span><em>Escolha uma opção dentre as abaixo:</em></span>
      </div>

      <div id="opcoes" class="flex-colunar padding-8" style="padding-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
        <span>
          <input type="radio" id="primeiraOpcao" name="option" class="radio" value="alternativaA" />
          <label for="primeiraOpcao" class="option" id="labelOpcaoUm"></label>
        </span>
        <span>
          <input type="radio" id="segundaOpcao" name="option" class="radio" value="alternativaB" />
          <label for="segundaOpcao" class="option" id="labelOpcaoDois"></label>
        </span>
        <span>
          <input type="radio" id="terceiraOpcao" name="option" class="radio" value="alternativaC" />
          <label for="terceiraOpcao" class="option" id="labelOpcaoTres"></label>
        </span>
        <span>
          <input type="radio" id="quartaOpcao" name="option" class="radio" value="alternativaD" />
          <label for="quartaOpcao" class="option" id="labelOpcaoQuatro"></label>
        </span>
      </div>

      <div id="botoes" class="flex-colunar padding-8" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
        <button onclick="submeter()" id="btnSub1meter" class="botao" style="height: 3rem; width: 9rem;"><p>Submeter resposta</p></button>
        <button onclick="voltar()" id="btnAnterior" disabled class="botao" style="height: 3rem; width: 9rem;"><p>Voltar para questão anterior</p></button>
        <button onclick="avancar()" id="btnProx" disabled class="botao" style="height: 3rem; width: 9rem;"><p>Avançar para próxima questão</p></button>
        <button onclick="tentarNovamente()" id="btnTentarNovamente" disabled class="botao" style="height: 3rem; width: 9rem;"><p>Tentar novamente</p></button>
      </div>

    </div>
  </div>
</body>

</html>
<script>
  const listaDeQuestoes = [

    {
      pergunta: "Qual seu formato de ilustração favorito?",
      alternativaA: "Tradicional/Lápis",
      alternativaB: "Pintura",
      alternativaC: "Digital",
      alternativaD: "outro",
      imagemA: "",
      imagemB: "./assets/imgs/vangogh.webp",
      imagemC: "./assets/imgs/Mika-Pikazo.jpeg",
      imagemD: "",
    },

    {
      pergunta: "Qual seu estilo de animação favorito?",
      alternativaA: "Anime",
      alternativaB: "Cartoon",
      alternativaC: "3D",
      alternativaD: "outro",
      imagemA: "./assets/imgs/FLCL.png",
      imagemB: "./assets/imgs/avatar.webp",
      imagemC: "./assets/imgs/divertidamente-2.webp",
      imagemD: "",
    },

    {
      pergunta: "Desses, qual estilo de animação de Anime lhe agrada mais?<br><p>(leia curiosidades para saber mais)</p>",
      alternativaA: "Kanada-style e parecidos",
      alternativaB: "Norio-Style e parecidos",
      alternativaC: "Focado em pós produção",
      alternativaD: "3D",
      imagemA: "./assets/imgs/kanada.gif",
      imagemB: "./assets/imgs/birdy.gif",
      imagemC: "",
      imagemD: "",
    },

    {
      pergunta: "Qual sua opinião sobre uso de IA na área artística?",
      alternativaA: "Não concordo",
      alternativaB: "Concordo",
      alternativaC: "Indiferente",
      alternativaD: "Depende",
      imagemA: "",
      imagemB: "",
      imagemC: "",
      imagemD: "",
    }

  ]

  // variáveis globais
  let numeroDaQuestaoAtual = 0
  let quantidadeDeQuestoes = listaDeQuestoes.length
  let respostas = new Array(quantidadeDeQuestoes).fill(null)

  function onloadEsconder() {
    document.getElementById('jogo').style.display = "none"
  }

  function iniciarQuiz() {
    document.getElementById('jogo').style.display = "flex"
    document.getElementById('btnIniciarQuiz').style.display = "none"

    document.getElementById('qtdQuestoes').innerHTML = quantidadeDeQuestoes

    preencherHTMLcomQuestaoAtual(0)

    btnSubmeter.disabled = false
    btnAnterior.disabled = true
    btnProx.disabled = true
    btnTentarNovamente.disabled = true
  }

  function preencherHTMLcomQuestaoAtual(index) {
    habilitarAlternativas(true)
    const questaoAtual = listaDeQuestoes[index]
    numeroDaQuestaoAtual = index
    document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = Number(index) + 1
    document.getElementById("spanQuestaoExibida").innerHTML = questaoAtual.pergunta;
    document.getElementById("labelOpcaoUm").innerHTML = buildLabelHTML(questaoAtual.alternativaA, questaoAtual.imagemA);
    document.getElementById("labelOpcaoDois").innerHTML = buildLabelHTML(questaoAtual.alternativaB, questaoAtual.imagemB);
    document.getElementById("labelOpcaoTres").innerHTML = buildLabelHTML(questaoAtual.alternativaC, questaoAtual.imagemC);
    document.getElementById("labelOpcaoQuatro").innerHTML = buildLabelHTML(questaoAtual.alternativaD, questaoAtual.imagemD);

    // Restore previously saved answer for this question, if any
    desmarcarRadioButtons()
    if (respostas[index] !== null) {
      const options = document.getElementsByName("option")
      options.forEach(opt => { if (opt.value === respostas[index]) opt.checked = true })
      habilitarAlternativas(false)
      btnSubmeter.disabled = true
      btnProx.disabled = false
    } else {
      btnSubmeter.disabled = false
      btnProx.disabled = true
    }

    btnAnterior.disabled = numeroDaQuestaoAtual === 0
  }


  function buildLabelHTML(texto, imagemSrc) {
    if (imagemSrc) {
        return `<span style="display:inline-flex; align-items:center; gap:8px;">
            ${texto}
            <img src="${imagemSrc}" alt="${texto}" style="height:10rem; object-fit:cover; border-radius:4px; padding-left: 4rem;">
        </span>`
    }
    return texto
  }

  function submeter() {
    const options = document.getElementsByName("option");

    let hasChecked = false
    let selectedValue = null
    for (let i = 0; i < options.length; i++) {
      if (options[i].checked) {
        hasChecked = true
        selectedValue = options[i].value
        break
      }
    }

    if (!hasChecked) {
      alert("Não há alternativas escolhidas. Escolha uma opção.")
    } else {
      respostas[numeroDaQuestaoAtual] = selectedValue
      btnSubmeter.disabled = true
      btnProx.disabled = false
      habilitarAlternativas(false)
    }
  }

  function habilitarAlternativas(trueOrFalse) {
    let opcaoEscolhida = trueOrFalse ? false : true

    primeiraOpcao.disabled = opcaoEscolhida
    segundaOpcao.disabled = opcaoEscolhida
    terceiraOpcao.disabled = opcaoEscolhida
    quartaOpcao.disabled = opcaoEscolhida
  }

  function avancar() {
    if (numeroDaQuestaoAtual < quantidadeDeQuestoes - 1) {
      preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual + 1)
    } else {
      finalizarJogo()
    }
  }

  function voltar() {
    if (numeroDaQuestaoAtual > 0) {
      preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual - 1)
    }
  }

  function tentarNovamente() {
    window.location.reload()
  }

  function desmarcarRadioButtons() {
    const options = document.getElementsByName("option");
    for (let i = 0; i < options.length; i++) {
      options[i].checked = false;
    }
  }

  function finalizarJogo() {
    
    window.location.href = 'dashboard.html'
  }
</script>
