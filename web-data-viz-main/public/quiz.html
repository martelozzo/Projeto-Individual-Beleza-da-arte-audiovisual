<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo - Quiz</title>
    <link rel="stylesheet" href="all_style.css">
</head>


<body onload="onloadEsconder()">
    <header class="header">

        <div class="header_title inter" style="font-size: 2.6rem;" onclick="window.location.href='index.html'" 3>A
            beleza e
            a importância da
            arte audiovisual</div>
        <div class="user inter">
            <p id="pfp" class="pfp_text"></p>
        </div>
        <div class="inter"><button class="sair" onclick=logout()>
                <p>Sair</p>
            </button></div>
    </header>
    <div id="pontuacaoEJogo">
        <div
            style="display:flex; justify-content: center; align-items: center; height: fit-content; width: fit-content; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <button id="btnIniciarQuiz" onclick="iniciarQuiz()" class="botao"
                style="display:flex; justify-content: center; align-items: center; height: 4rem; width: 8rem; margin: 2rem;">
                <p>INICIAR QUIZ</p>
            </button>
            <button id="btnIrPraDash" onclick="irParaDash()" class="botao"
                style="display:flex; justify-content: center; align-items: center; height: 4rem; width: 8rem; margin: 2rem;">
                <p>IR PARA DASHBOARD</p>
            </button>
        </div>


        <div id="pontuacao" class="flex-colunar width-fit-content border-primary">
            <div id="pontuacaoDuranteJogo" class="flex-colunar padding-8">
                <span class="width-fit-content">Quantidade de acertos: <span id="spanCertas"><br></span></span>
                <span class="width-fit-content">Quantidade de erros: <span id="spanErradas"><br></span></span>
            </div>
            <div id="pontuacaoFinalJogo" class="flex-colunar padding-8" style="margin: 1rem;">
                <span id="pontuacaoFinal" class="width-fit-content">Pontuação Final:
                    <span id="spanPontuacaoFinal">***</span>
                </span>
                <span id="msgFinal" class="width-fit-content">***</span>
            </div>
            <div id="infoQuestao" class="padding-8">
                <span>Questão atual: <span id="spanNumeroDaQuestaoAtual"></span> de <span id="qtdQuestoes"></span>
                    questões.</span>
            </div>
        </div>

        <div id="jogo" class="inter">



            <div id="perguntaDaQuestaoAtual" class="padding-8">
                <span id="spanQuestaoExibida" class="inter"></span>
            </div>

            <div id="imagemQuestao"></div>

            <div class="container_questao">
                <div id="infoAlternativas" class="padding-8">
                    <span><em>Escolha uma opção dentre as abaixo:</em></span>
                </div>



                <div id="opcoes" class="flex-colunar padding-8"
                    style="padding-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">

                    <label id="labelOpcaoUm" class="option"
                        style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" id="primeiraOpcao" name="option" class="radio" value="alternativaA" />
                        <span></span>
                    </label>

                    <label id="labelOpcaoDois" class="option"
                        style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" id="segundaOpcao" name="option" class="radio" value="alternativaB" />
                        <span></span>
                    </label>

                    <label id="labelOpcaoTres" class="option"
                        style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" id="terceiraOpcao" name="option" class="radio" value="alternativaC" />
                        <span></span>
                    </label>

                    <label id="labelOpcaoQuatro" class="option"
                        style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" id="quartaOpcao" name="option" class="radio" value="alternativaD" />
                        <span></span>
                    </label>

                    <span id="msgEnvio" class="width-fit-content" style="margin-top: 0.5rem;"></span>
                </div>



            </div>
            <div id="botoes">
                <button onclick="submeter()" id="btnSubmeter" class="botao" style="height: 3rem; width: 9rem;">
                    <p>Submeter resposta</p>
                </button>
                <button onclick="avancar()" id="btnProx" disabled class="botao" style="height: 3rem; width: 9rem;">
                    <p>Avançar para próxima questão</p>
                </button>
                <!-- <button onclick="finalizar()" id="btnConcluir" disabled>Finalizar Quiz</button> -->
                <button onclick="tentarNovamente()" id="btnTentarNovamente" class="botao"
                    style="height: 3rem; width: 9rem;" disabled>
                    <p>Tentar novamente</p>
                </button>
                <button onclick="irParaDash()" id="btnDash" class="botao" disabled
                    style="display: none; height: 3rem; width: 9rem; justify-content: center; align-items: center;">
                    <p>Resultados</p>
                </button>
            </div>
        </div>
</body>

</html>
<script>

    const nome = sessionStorage.NOME_USUARIO;
    const id = sessionStorage.ID_USUARIO;

    let letra_pfp = nome ? nome.charAt(0).toUpperCase() : '?';

    pfp.innerHTML = `${letra_pfp}`


    function logout() {
        sessionStorage.clear();
        window.location.href = `login.html`
    }

    const listaDeQuestoes = [

        {

            alternativaA: "15", idA: 5,
            alternativaB: "7", idB: 6,
            alternativaC: "10", idC: 7,
            alternativaD: "12", idD: 8,
            alternativaCorreta: "alternativaD"
        },

        {
            id: 3,
            pergunta: "Na arte 'A última ceia' de Leonardo qual conceito revolucionário na época foi utilizado?",
            imagem: "./assets/imgs/ultimaceia.webp",
            alternativaA: "Luz em Sombra", idA: 9,
            alternativaB: "Perspectiva", idB: 10,
            alternativaC: "Religião", idC: 11,

        },

        {
            id: 4,

            imagem: "./assets/imgs/fundamentosquiz.jpg",
            alternativaA: "Formas", idA: 13,
            alternativaB: "Luz e sombra", idB: 14,
            alternativaC: "Cor", idC: 15,
            alternativaD: "Anatomia", idD: 16,
            alternativaCorreta: "alternativaA"
        },

        {
            id: 5,
            pergunta: "Quais conceitos geralmente mais ajudam na 'Fluidez' de uma animação?",
            imagem: "./assets/imgs/fluidez.gif",
            alternativaA: "Timing e Distorção", idA: 17,

            alternativaC: "Mesclar com 3D", idC: 19,
            alternativaD: "Anatomia", idD: 20,
            alternativaCorreta: "alternativaA"
        },

        {
            id: 6,
            pergunta: "Por qual destes motivos a arte teve grande influência no avanço científico que contribuiu a salvar vidas?",
            imagem: "./assets/imgs/medicina.webp",
            alternativaA: "Primeira inspeção anatômica de um corpo falecido foi feito por um artista, tendo uso medicinal", idA: 21,
            alternativaB: "A procura de mais tintas se foi criado remédios", idB: 22,
            alternativaC: "A pintura de obras religiosas que eram usadas como terapia visual para acalmar os enfermos", idC: 23,
            alternativaD: "A invenção de novos pincéis que foram adaptados como ferramentas cirúrgicas", idD: 24,
            alternativaCorreta: "alternativaA"
        },

        {
            id: 7,
            pergunta: "Qual o nome da técnica utilizada na imagem abaixo?",
            imagem: "./assets/imgs/surfacescattering.png",
            alternativaA: "Oclusão de Ambiente", idA: 25,
            alternativaB: "Sombra de Contato", idB: 26,
            alternativaC: "Disperção Subsuperficial", idC: 27,
            alternativaD: "Reflexão de Matiz", idD: 28,
            alternativaCorreta: "alternativaC"
        },

        {
            id: 8,

            imagem: "./assets/imgs/hands.gif",
            alternativaA: "Itano Circus", idA: 29,
            alternativaB: "Obari Style", idB: 30,
            alternativaC: "Norio Style", idC: 31,
            alternativaD: "Kanada Style", idD: 32,
            alternativaCorreta: "alternativaD"
        },

        {
            id: 9,
            pergunta: "Quem foi o criador da famosa técnica chamada 'Impact Frames' ou Frames de Impacto?",
            imagem: "./assets/imgs/impactframe.gif",
            alternativaA: "Yutaka Nakamura", idA: 33,
            alternativaB: "Vincent Chansard", idB: 34,
            alternativaC: "James Baxter", idC: 35,
            alternativaD: "Weiling Zhang", idD: 36,
            alternativaCorreta: "alternativaA"
        },

        {
            id: 10,
            pergunta: "Qual destas ilustrações está mais anatomicamente correta?",
            imagem: "./assets/imgs/anatomiaquiz.png",
            alternativaA: "Primeira", idA: 37,
            alternativaB: "Segunda", idB: 38,
            alternativaC: "Terceira", idC: 39,
            alternativaD: "Quarta", idD: 40,
            alternativaCorreta: "alternativaD"
        }

    ]

    // variáveis globais
    let respostasParaEnviar = []
    let numeroDaQuestaoAtual = 0
    let pontuacaoFinal = 0
    let certas = 0
    let erradas = 0
    let quantidadeDeQuestoes = listaDeQuestoes.length

    function getUsuarioId() {
        const id = sessionStorage.getItem('ID_USUARIO')
        if (!id) {
            console.warn('Usuário não autenticado.')
            return null
        }
        return parseInt(id)
    }

    function onloadEsconder() {
        document.getElementById('pontuacao').style.display = "none"
        document.getElementById('jogo').style.display = "none"
        document.getElementById('btnIrPraDash').style.display = "none"


    }

    function iniciarQuiz() {
        document.getElementById('pontuacao').style.display = "flex"
        document.getElementById('jogo').style.display = "flex"
        document.getElementById('btnIniciarQuiz').style.display = "none"
        document.getElementById('btnIrPraDash').style.display = "none"

        document.getElementById('qtdQuestoes').innerHTML = quantidadeDeQuestoes

        preencherHTMLcomQuestaoAtual(0)

        btnSubmeter.disabled = false
        btnProx.disabled = true
        btnTentarNovamente.disabled = true
    }

    function preencherHTMLcomQuestaoAtual(index) {
        habilitarAlternativas(true)
        const questaoAtual = listaDeQuestoes[index]
        numeroDaQuestaoAtual = index

        document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = Number(index) + 1
        document.getElementById("spanQuestaoExibida").innerHTML = questaoAtual.pergunta;
        document.querySelector("#labelOpcaoUm span").textContent = questaoAtual.alternativaA;
        document.querySelector("#labelOpcaoDois span").textContent = questaoAtual.alternativaB;
        document.querySelector("#labelOpcaoTres span").textContent = questaoAtual.alternativaC;
        document.querySelector("#labelOpcaoQuatro span").textContent = questaoAtual.alternativaD;

        const imgContainer = document.getElementById("imagemQuestao")
        if (questaoAtual.imagem) {
            imgContainer.innerHTML = `<img src="${questaoAtual.imagem}" alt="Imagem da questão">`
            imgContainer.style.display = "flex"
        } else {
            imgContainer.innerHTML = ""
            imgContainer.style.display = "none"
        }
    }

    function submeter() {
        const options = document.getElementsByName("option");

        let hasChecked = false
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                hasChecked = true
                break
            }
        }

        if (!hasChecked) {
            alert("Não há alternativas escolhidas. Escolha uma opção.")
        } else {
            btnSubmeter.disabled = true
            btnProx.disabled = false

            habilitarAlternativas(false)

            checarResposta()
        }
    }

    function habilitarAlternativas(trueOrFalse) {
        let opcaoEscolhida = trueOrFalse ? false : true

        primeiraOpcao.disabled = opcaoEscolhida
        segundaOpcao.disabled = opcaoEscolhida
        terceiraOpcao.disabled = opcaoEscolhida
        quartaOpcao.disabled = opcaoEscolhida
    }

    function avancar() {
        btnProx.disabled = true
        btnSubmeter.disabled = false


        desmarcarRadioButtons()

        if (numeroDaQuestaoAtual < quantidadeDeQuestoes - 1) {
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
        } else if (numeroDaQuestaoAtual == quantidadeDeQuestoes - 1) {
            alert("Atenção... a próxima é a ultima questão!")
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
        } else {
            finalizarJogo()
        }
        limparCoresBackgroundOpcoes()
    }

    function tentarNovamente() {
        window.location.reload()
    }

    function checarResposta() {
        const questaoAtual = listaDeQuestoes[numeroDaQuestaoAtual]
        const respostaQuestaoAtual = questaoAtual.alternativaCorreta

        const options = document.getElementsByName("option");

        let alternativaCorreta = null

        options.forEach((option) => {
            if (option.value === respostaQuestaoAtual) {
                alternativaCorreta = option.labels[0].id
            }
        })

        options.forEach((option) => {
            if (option.checked === true && option.value === respostaQuestaoAtual) {
                document.getElementById(alternativaCorreta).classList.add("text-success-with-bg")
                pontuacaoFinal++
                certas++
                document.getElementById("spanCertas").innerHTML = certas
                numeroDaQuestaoAtual++
            } else if (option.checked && option.value !== respostaQuestaoAtual) {
                const wrongLabelId = option.labels[0].id
                document.getElementById(wrongLabelId).classList.add("text-danger-with-bg")
                document.getElementById(alternativaCorreta).classList.add("text-success-with-bg")
                erradas++
                document.getElementById("spanErradas").innerHTML = erradas
                numeroDaQuestaoAtual++
            }
        })

        // Registra a resposta com os IDs do banco para envio posterior
        const idMap = {
            alternativaA: questaoAtual.idA,
            alternativaB: questaoAtual.idB,
            alternativaC: questaoAtual.idC,
            alternativaD: questaoAtual.idD
        }
        const elementoMarcado = document.querySelector('input[name="option"]:checked');

        respostasParaEnviar.push({
            questao_id: questaoAtual.id,
            alternativa_id: idMap[elementoMarcado.value]
        });
    }

    function limparCoresBackgroundOpcoes() {
        const options = document.getElementsByName("option");
        options.forEach((option) => {
            document.getElementById(option.labels[0].id).classList.remove("text-danger-with-bg")
            document.getElementById(option.labels[0].id).classList.remove("text-success-with-bg")
        })
    }

    function desmarcarRadioButtons() {
        const options = document.getElementsByName("option");
        for (let i = 0; i < options.length; i++) {
            options[i].checked = false;
        }
    }

    function finalizarJogo() {
        let textoParaMensagemFinal = null
        let classComCoresParaMensagemFinal = null
        const porcentagemFinalDeAcertos = pontuacaoFinal / quantidadeDeQuestoes

        if (porcentagemFinalDeAcertos <= 0.3) {
            textoParaMensagemFinal = "Parece que você não estudou..."
            classComCoresParaMensagemFinal = "text-danger-with-bg"
        }
        else if (porcentagemFinalDeAcertos > 0.3 && porcentagemFinalDeAcertos < 0.9) {
            textoParaMensagemFinal = "Pode melhorar na próxima, hein!"
            classComCoresParaMensagemFinal = "text-warning-with-bg"
        }
        else if (porcentagemFinalDeAcertos >= 0.9) {
            textoParaMensagemFinal = "Uau, parabéns!"
            classComCoresParaMensagemFinal = "text-success-with-bg"
        }

        textoParaMensagemFinal += "<br> Você acertou " + Math.round((porcentagemFinalDeAcertos) * 100) + "% das questões."

        document.getElementById('msgFinal').innerHTML = textoParaMensagemFinal
        document.getElementById('msgFinal').classList.add(classComCoresParaMensagemFinal)
        document.getElementById('spanPontuacaoFinal').innerHTML = pontuacaoFinal

        document.getElementById('jogo').classList.add("text-new-gray")

        btnProx.disabled = true
        btnSubmeter.disabled = true
        btnTentarNovamente.disabled = false

        validarBanco()
    }


    async function validarBanco() {

        const usuarioId = getUsuarioId()

        if (!usuarioId) {
            msgEnvio.innerHTML = "Faça login para salvar seus resultados."
            msgEnvio.style.color = "orange"
            return
        }

        const payload = {
            usuario_id: usuarioId,
            //respostas:  respostasParaEnviar
        }

        try {
            const response = await fetch('/quiz/validar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })

            if (response.ok) {
                msgEnvio.innerHTML = "Ja respondido antes, indo atualizar respostas"
                msgEnvio.style.color = "green"
                console.log(`passei no repsondido antes`);

                atualizarRespostarParaBanco()
            }
            else {
                const errorText = await response.text()
                console.error('Erro do servidor:', errorText)
                //msgEnvio.innerHTML   = `Erro ${response.status}: ${response.statusText}`
                msgEnvio.innerHTML = `indo enviar respostas para banco...`
                msgEnvio.style.color = "green"
                console.log(`passei no enviar novo`);
                enviarRespostasParaBancoDeDados()
            }
        } catch (error) {
            console.error('Falha na requisição:', error)
            msgEnvio.innerHTML = "Não foi possível conectar ao servidor."
            msgEnvio.style.color = "red"
        }
    }

    async function atualizarRespostarParaBanco() {
        const msgEnvio = document.getElementById('msgEnvio')
        const usuarioId = getUsuarioId()

        if (!usuarioId) {
            msgEnvio.innerHTML = "Faça login para salvar seus resultados."
            msgEnvio.style.color = "orange"
            return
        }



        msgEnvio.innerHTML = "Salvando resultados..."

        const payload = {
            usuario_id: usuarioId,
            respostas: respostasParaEnviar
        }

        try {
            const response = await fetch('/quiz/atualizar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })

            if (response.ok) {
                msgEnvio.innerHTML = "Resultados salvos com sucesso!"
                msgEnvio.style.color = "green"
                document.getElementById('btnDash').style.display = "flex"
                btnDash.disabled = false;
            } else {
                const errorText = await response.text()
                console.error('Erro do servidor:', errorText)
                msgEnvio.innerHTML = `Erro ${response.status}: ${response.statusText}`
                msgEnvio.style.color = "red"
            }
        } catch (error) {
            console.error('Falha na requisição:', error)
            msgEnvio.innerHTML = "Não foi possível conectar ao servidor."
            msgEnvio.style.color = "red"
        }
    }

    function irParaDash() {
        window.location.href = `dashboard.html`
    }

    async function enviarRespostasParaBancoDeDados() {
        const msgEnvio = document.getElementById('msgEnvio')
        const usuarioId = getUsuarioId()

        if (!usuarioId) {
            msgEnvio.innerHTML = "Faça login para salvar seus resultados."
            msgEnvio.style.color = "orange"
            return
        }



        msgEnvio.innerHTML = "Salvando resultados..."

        const payload = {
            usuario_id: usuarioId,
            respostas: respostasParaEnviar
        }

        try {
            const response = await fetch('/quiz/cadastrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })

            if (response.ok) {
                msgEnvio.innerHTML = "Resultados salvos com sucesso!"
                msgEnvio.style.color = "green"
                document.getElementById('btnDash').style.display = "flex"
                btnDash.disabled = false;
            } else {
                const errorText = await response.text()
                console.error('Erro do servidor:', errorText)
                msgEnvio.innerHTML = `Erro ${response.status}: ${response.statusText}`
                msgEnvio.style.color = "red"
            }
        } catch (error) {
            console.error('Falha na requisição:', error)
            msgEnvio.innerHTML = "Não foi possível conectar ao servidor."
            msgEnvio.style.color = "red"
        }
    }

    function irParaDash() {
        window.location.href = `dashboard.html`
    }

    async function validarUser() {
        console.log("rodei validar user");

        const usuarioId = getUsuarioId()

        if (!usuarioId) {
            msgEnvio.innerHTML = "Faça login para salvar seus resultados."
            msgEnvio.style.color = "orange"
            return
        }

        const payload = {
            usuario_id: usuarioId,
            //respostas:  respostasParaEnviar
        }

        try {
            const response = await fetch('/quiz/validar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })

            if (response.ok) {
                //msgEnvio.innerHTML = "Ja respondido antes, liberando botao dash"
                //msgEnvio.style.color = "green"
                console.log(`passei no repsondido antes`);

                liberarBotaoDash()
            } else {
                const errorText = await response.text()
                console.error('Erro do servidor:', errorText)
                //msgEnvio.innerHTML   = `Erro ${response.status}: ${response.statusText}`
                //msgEnvio.innerHTML = ``
                //msgEnvio.style.color = "green"
                console.log(`passei no novo`);

            }
        } catch (error) {
            console.error('Falha na requisição:', error)
            msgEnvio.innerHTML = "Não foi possível conectar ao servidor."
            msgEnvio.style.color = "red"
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        // Coloque a sua função aqui
        validarUser();
    });

    function liberarBotaoDash() {

        let botao = document.getElementById("btnIrPraDash")
        botao.style.display = "flex"

    }


</script>
