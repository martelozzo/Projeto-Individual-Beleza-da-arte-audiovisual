<body>

    <header class="header">

        <div class="header_title inter" onclick="window.location.href='index.html'" 3>A beleza e a importância da
            arte audiovisual</div>
        <div class="login inter"><button onclick="window.location.href='login.html'">
                <p>Login</p>
            </button></div>
    </header>
    <div class="fundo_login">

        <div class="container_cadastro inter">
            <h1>Cadastro</h1>

            <p style="font-size: 1.5rem; margin-bottom: 1.5rem;">Crie a sua conta</p>

            <form>

                <input type="text" id="nome_input" placeholder="Nome de usuário">

                <input type="email" id="email_input" placeholder="Email">

                <input type="password" id="senha_input" placeholder="Senha">

                <input type="password" id="confirmacao_senha_input" placeholder="Confirme sua senha">

                <div id="cardErro">
                    <span id="mensagem_erro"></span>
                </div>


                <button type="button" class="botao" onclick="validar_cadastro()">
                    <p>Criar conta</p>
                </button>

            </form>

            <p class="">
                Já possui conta?
                <a href="login.html">Entrar</a>
            </p>
        </div>
</body>

<script>
    //let listaEmpresasCadastradas = [];

        function validar_cadastro(){

        var emailVar = email_input.value;
        var senhaConfVar = confirmacao_senha_input.value
        var senhaVar = senha_input.value;

            var regrasLogin = [
        {
            condicao: emailVar === "",
            mensagem: "O campo de e-mail não pode estar vazio."
        },
        {
            condicao: !emailVar.includes("@") || !emailVar.includes("."),
            mensagem: "Informe um e-mail válido (ex: nome@email.com)."
        },
        {
            condicao: senhaVar === "" || senhaConfVar === "",
            mensagem: "Os campos de senhas não podem estar vazio."
        },
        {
            condicao: senhaVar.length < 6,
            mensagem: "A senha deve ter no mínimo 6 caracteres."
        },
        {
            condicao: senhaVar != senhaConfVar,
            mensagem: "As senhas devem estar iguais"
        }
    ];

       

        for (var i = 0; i < regrasLogin.length; i++) {
            mensagem_erro.innerHTML = regrasLogin[i].mensagem;
            if (regrasLogin[i].condicao) {
                cardErro.style.display = "block";
                
                console.log(regrasLogin[i]);
                //cardErro.innerHTML = `${regrasLogin[i].mensagem}`
                
                
                return false; // Para na primeira regra quebrada
            }
        }
        cadastrar();
    }

    function cadastrar() {
        // aguardar();

        //Recupere o valor da nova input pelo nome do id
        // Agora vá para o método fetch logo abaixo
        var nomeVar = nome_input.value;
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        var confirmacaoSenhaVar = confirmacao_senha_input.value;
       

        // Verificando se há algum campo em branco
        if (
            nomeVar == "" ||
            emailVar == "" ||
            senhaVar == "" ||
            confirmacaoSenhaVar == ""
            
        ) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML =
                "(Mensagem de erro para todos os campos em branco)";

            finalizarAguardar();
            return false;
        } else {
            setInterval(sumirMensagem, 5000);
        }

        // Verificando se o código de ativação é de alguma empresa cadastrada
        /*
        for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
            if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
                idEmpresaVincular = listaEmpresasCadastradas[i].id
                console.log("Código de ativação válido.");
                break;
            } else {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
                finalizarAguardar();
            }
        }
        */

        // Enviando o valor da nova input
        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                nomeServer: nomeVar,
                emailServer: emailVar,
                senhaServer: senhaVar,
                //idEmpresaVincularServer: idEmpresaVincular
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    cardErro.style.display = "block";

                    mensagem_erro.innerHTML =
                        "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, "2000");

                    limparFormulario();
                    finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;
    }

        cardErro.style.display = "none";
    }
</script>
</script>
