<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo - Quiz</title>
    <link rel="stylesheet" href="all_style.css">
</head>


<body onload="onloadEsconder()">
    <header class="header">

        <div class="header_title inter" style="font-size: 2.6rem;" onclick="window.location.href='index.html'" 3>A
            beleza e
            a importância da
            arte audiovisual</div>
        <div class="login inter"><button onclick="window.location.href='login.html'">
                <p>Login</p>
            </button></div>
    </header>
    <div id="pontuacaoEJogo" style="display: flex; height: 100%; width: 100%;">
        <button id="btnIniciarQuiz" onclick="iniciarQuiz()" class="botao"
            style="display:flex; justify-content: center; align-items: center; height: 4rem; width: 8rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <p>INICIAR QUIZ</p>
        </button>

        <div id="pontuacao" class="flex-colunar width-fit-content border-primary">
            <div id="pontuacaoDuranteJogo" class="flex-colunar padding-8">
                <span class="width-fit-content">Quantidade de acertos: <span id="spanCertas"></span></span>
                <span class="width-fit-content">Quantidade de erros: <span id="spanErradas"></span></span>
            </div>
            <div id="pontuacaoFinalJogo" class="flex-colunar padding-8">
                <span id="pontuacaoFinal" class="width-fit-content">Pontuação Final:
                    <span id="spanPontuacaoFinal">***</span>
                </span>
                <span id="msgFinal" class="width-fit-content">***</span>
            </div>
        </div>

        <div id="jogo" class="inter"
            style="position: relative; padding-bottom: 11rem; display: flex; flex-direction: column;">

            <div id="infoQuestao" class="padding-8" style="display: flex; align-self: flex-start; padding-left: 3rem;">
                <span>Questão atual: <span id="spanNumeroDaQuestaoAtual"></span> de <span id="qtdQuestoes"></span>
                    questões.</span>
            </div>

            <div id="perguntaDaQuestaoAtual" class="padding-8">
                <span id="spanQuestaoExibida" class="text-bold"></span>
            </div>

            <div id="infoAlternativas" class="padding-8">
                <span><em>Escolha uma opção dentre as abaixo:</em></span>
            </div>

            <div id="imagemQuestao"></div>

            <div id="opcoes" class="flex-colunar padding-8"
                style="padding-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                <span>
                    <input type="radio" id="primeiraOpcao" name="option" class="radio" />
                    <label for="primeiraOpcao" class="option" id="labelOpcaoUm"></label>
                </span>
                <span>
                    <input type="radio" id="segundaOpcao" name="option" class="radio" />
                    <label for="segundaOpcao" class="option" id="labelOpcaoDois"></label>
                </span>
                <span>
                    <input type="radio" id="terceiraOpcao" name="option" class="radio" />
                    <label for="terceiraOpcao" class="option" id="labelOpcaoTres"></label>
                </span>
                <span>
                    <input type="radio" id="quartaOpcao" name="option" class="radio" />
                    <label for="quartaOpcao" class="option" id="labelOpcaoQuatro"></label>
                </span>
                <span id="msgEnvio" class="width-fit-content" style="margin-top: 0.5rem;"></span>

            </div>

            <div id="botoes" class="flex-colunar padding-8" style="display: flex; flex-direction: row; flex-wrap: wrap; gap: 0.5rem; justify-content: center; align-items: center;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: max-content;">
                <button onclick="submeter()" id="btnSubmeter" class="botao" style="height: 3rem; width: 9rem;">
                    <p>Submeter resposta</p>
                </button>
                <button onclick="avancar()" id="btnProx" disabled class="botao" style="height: 3rem; width: 9rem;">
                    <p>Avançar para próxima questão</p>
                </button>
                <!-- <button onclick="finalizar()" id="btnConcluir" disabled>Finalizar Quiz</button> -->
                <button onclick="tentarNovamente()" id="btnTentarNovamente" class="botao"
                    style="height: 3rem; width: 9rem;" disabled>
                    <p>Tentar novamente</p>
                </button>
            </div>


        </div>
    </div>
</body>

</html>

            ]
        },
        {
            id: 2,
            enunciado: "Quantos princípios tem a Animação?",
            imagem: "",
            alternativas: [
                { id: 5, texto: "15", correta: false, ordem: 1 },
                { id: 6, texto: "7", correta: false, ordem: 2 },
                { id: 7, texto: "10", correta: false, ordem: 3 },
                { id: 8, texto: "12", correta: true, ordem: 4 }
            ]
        },
        {
            id: 3,
            enunciado: "Na arte 'A última ceia' de Leonardo qual conceito revolucionário na época foi utilizado?",
            imagem: "",
            alternativas: [
                { id: 9, texto: "Luz em Sombra", correta: false, ordem: 1 },
                { id: 10, texto: "Perspectiva", correta: true, ordem: 2 },
                { id: 11, texto: "Religião", correta: false, ordem: 3 },
                { id: 12, texto: "Anatomia", correta: false, ordem: 4 }
            ]
        },
        {
            id: 4,
            enunciado: "Qual destes fundamentos da arte se demonstra o mais essencial como base?",
            imagem: "",
            alternativas: [
                { id: 13, texto: "Formas", correta: true, ordem: 1 },
                { id: 14, texto: "Luz e sombra", correta: false, ordem: 2 },
                { id: 15, texto: "Cor", correta: false, ordem: 3 },
                { id: 16, texto: "Anatomia", correta: false, ordem: 4 }
            ]
        },
        {
            id: 5,
            enunciado: "Quais conceitos geralmente mais ajudam na 'Fluidez' de uma animação?",
            imagem: "",
            alternativas: [
                { id: 17, texto: "Timing e Distorção", correta: false, ordem: 1 },
                { id: 18, texto: "Mais frames por segundo", correta: true, ordem: 2 },
                { id: 19, texto: "Mesclar com 3D", correta: false, ordem: 3 },
                { id: 20, texto: "Anatomia", correta: false, ordem: 4 }
            ]
        },
        {
            id: 6,
            enunciado: "Quais conceitos geralmente mais ajudam na 'Fluidez' de uma animação?",
            imagem: "",
            alternativas: [
                { id: 21, texto: "Timing e Distorção", correta: false, ordem: 1 },
                { id: 22, texto: "Mais frames por segundo", correta: true, ordem: 2 },
                { id: 23, texto: "Mesclar com 3D", correta: false, ordem: 3 },
                { id: 24, texto: "Anatomia", correta: false, ordem: 4 }
            ]
        }
    ]

    let respostasParaEnviar = []

    function getUsuarioId() {
        const id = localStorage.getItem('usuario_id')

        if (!id) {
            console.warn('Usuário não autenticado.')
            return null
        }
        return parseInt(id)
    }

    let numeroDaQuestaoAtual = 0
    let pontuacaoFinal = 0
    //let tentativaIncorreta = 0
    let certas = 0
    let erradas = 0
    let quantidadeDeQuestoes = listaDeQuestoes.length


    function onloadEsconder() {
        document.getElementById('pontuacao').style.display = "none"
        document.getElementById('jogo').style.display = "none"
    }

    function iniciarQuiz() {
        document.getElementById('pontuacao').style.display = "flex"
        document.getElementById('jogo').style.display = "flex"
        document.getElementById('btnIniciarQuiz').style.display = "none"

        document.getElementById('qtdQuestoes').innerHTML = quantidadeDeQuestoes

        preencherHTMLcomQuestaoAtual(0)

        btnSubmeter.disabled = false
        btnProx.disabled = true
        // btnConcluir.disabled = true
        btnTentarNovamente.disabled = true
    }


    function preencherHTMLcomQuestaoAtual(index) {
    habilitarAlternativas(true)

    const questao = listaDeQuestoes[index]
    numeroDaQuestaoAtual = index

    // Atualiza contador de questão
    document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = index + 1

    // Preenche o enunciado
    document.getElementById("spanQuestaoExibida").innerHTML = questao.enunciado

    // Exibe ou oculta a imagem (campo só do front, nunca vai ao banco)
    const imgContainer = document.getElementById("imagemQuestao")
    if (questao.imagem) {
        imgContainer.innerHTML = `<img src="${questao.imagem}" alt="Imagem da questão">`
        imgContainer.style.display = "block"
    } else {
        imgContainer.innerHTML = ""
        imgContainer.style.display = "none"
    }

    // Ordena as alternativas pelo campo `ordem` antes de exibir
    const ordenadas = [...questao.alternativas].sort((a, b) => a.ordem - b.ordem)

    const inputIds = ["primeiraOpcao", "segundaOpcao", "terceiraOpcao", "quartaOpcao"]
    const labelIds = ["labelOpcaoUm", "labelOpcaoDois", "labelOpcaoTres", "labelOpcaoQuatro"]

    ordenadas.forEach((alt, i) => {
        const input = document.getElementById(inputIds[i])

        // Injeta alternativas.id no input — será lido em checarResposta()
        // para montar o payload { questao_id, alternativa_id }
        input.dataset.altId = alt.id

        // Injeta se esta alternativa é a correta — lido em checarResposta()
        // para saber se acertou sem precisar reler listaDeQuestoes
        input.dataset.correta = alt.correta

        document.getElementById(labelIds[i]).innerHTML = alt.texto
    })
}

        habilitarAlternativas(true)
        const questaoAtual = listaDeQuestoes[index]
        numeroDaQuestaoAtual = index
        console.log("questaoAtual")
        console.log(questaoAtual)
        /*document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = Number(index) + 1 // ajustando porque o index começa em 0
        document.getElementById("spanQuestaoExibida").innerHTML = questaoAtual.pergunta;
        document.getElementById("labelOpcaoUm").innerHTML = questaoAtual.alternativaA;
        document.getElementById("labelOpcaoDois").innerHTML = questaoAtual.alternativaB;
        document.getElementById("labelOpcaoTres").innerHTML = questaoAtual.alternativaC;
        document.getElementById("labelOpcaoQuatro").innerHTML = questaoAtual.alternativaD;
        document.getElementById("imagemQuestao").innerHTML = questaoAtual.imagem;

    function submeter() {
        const options = document.getElementsByName("option"); // recupera alternativas no html

        let hasChecked = false
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                hasChecked = true
                break
            }
        }

        if (!hasChecked) {
            alert("Não há alternativas escolhidas. Escolha uma opção.")
        } else {
            btnSubmeter.disabled = true
            btnProx.disabled = false

            habilitarAlternativas(false)

            checarResposta()
        }
    }

    function habilitarAlternativas(trueOrFalse) {
        let opcaoEscolhida = trueOrFalse ? false : true

        primeiraOpcao.disabled = opcaoEscolhida
        segundaOpcao.disabled = opcaoEscolhida
        terceiraOpcao.disabled = opcaoEscolhida
        quartaOpcao.disabled = opcaoEscolhida

    }

    function avancar() {
        btnProx.disabled = true
        btnSubmeter.disabled = false

        desmarcarRadioButtons()

        if (numeroDaQuestaoAtual < quantidadeDeQuestoes - 1) {
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
        } else if (numeroDaQuestaoAtual == quantidadeDeQuestoes - 1) {
            alert("Atenção... a próxima é a ultima questão!")
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
        } else {
            finalizarJogo()
        }
        limparCoresBackgroundOpcoes()
    }

    function tentarNovamente() {
        // atualiza a página
        window.location.reload()
    }

    function checarResposta() {
        const questao = listaDeQuestoes[numeroDaQuestaoAtual]
        const options = [...document.getElementsByName("option")]

        // Encontra o input marcado pelo usuário
        const opcaoMarcada = options.find(o => o.checked)

        // Encontra o input da alternativa correta (para destacar visualmente)
        const opcaoCorreta = options.find(o => o.dataset.correta === "true")

        if (!opcaoMarcada) return

        // Lê data-correta injetado por preencherHTMLcomQuestaoAtual()
        const acertou = opcaoMarcada.dataset.correta === "true"

        if (acertou) {
            opcaoMarcada.labels[0].classList.add("text-success-with-bg")
            pontuacaoFinal++
            certas++
            document.getElementById("spanCertas").innerHTML = certas
        } else {
            // Marca a escolhida como errada e destaca a correta
            opcaoMarcada.labels[0].classList.add("text-danger-with-bg")
            if (opcaoCorreta) {
                opcaoCorreta.labels[0].classList.add("text-success-with-bg")
            }
            erradas++
            document.getElementById("spanErradas").innerHTML = erradas
        }

        // Registra a resposta com os IDs reais do banco.
        // Estes são os únicos campos da tabela `respostas` que vêm do front:
        //   questao_id     → questoes.id
        //   alternativa_id → alternativas.id
        // usuario_id é adicionado depois em enviarRespostasParaBancoDeDados()
        respostasParaEnviar.push({
            questao_id: questao.id,
            alternativa_id: parseInt(opcaoMarcada.dataset.altId)
        })

        numeroDaQuestaoAtual++
    }

    function limparCoresBackgroundOpcoes() {
        const options = document.getElementsByName("option");
        options.forEach((option) => {
            document.getElementById(option.labels[0].id).classList.remove("text-danger-with-bg")
            document.getElementById(option.labels[0].id).classList.remove("text-success-with-bg")
        })
    }

    function desmarcarRadioButtons() {
        const options = document.getElementsByName("option");
        for (let i = 0; i < options.length; i++) {
            options[i].checked = false;
        }
    }

    function finalizarJogo() {
        const porcentagem = pontuacaoFinal / quantidadeDeQuestoes
        let msgTexto, msgClasse

        if (porcentagem <= 0.3) {
            msgTexto = "Parece que você não estudou..."
            msgClasse = "text-danger-with-bg"
        } else if (porcentagem < 0.9) {
            msgTexto = "Pode melhorar na próxima, hein!"
            msgClasse = "text-warning-with-bg"
        } else {
            msgTexto = "Uau, parabéns!"
            msgClasse = "text-success-with-bg"
        }

        msgTexto += `<br> Você acertou ${Math.round(porcentagem * 100)}% das questões.`

        document.getElementById('msgFinal').innerHTML = msgTexto
        document.getElementById('msgFinal').classList.add(msgClasse)
        document.getElementById('spanPontuacaoFinal').innerHTML = pontuacaoFinal
        document.getElementById('jogo').classList.add("text-new-gray")

        btnProx.disabled = true
        btnSubmeter.disabled = true
        btnTentarNovamente.disabled = false

        // Dispara o envio ao banco — só acontece aqui,
        // depois que todas as respostas foram coletadas em respostasParaEnviar
        enviarRespostasParaBancoDeDados()
    }

    async function enviarRespostasParaBancoDeDados() {
    const msgEnvio  = document.getElementById('msgEnvio')
    const usuarioId = getUsuarioId() // ← única chamada de getUsuarioId()

    if (!usuarioId) {
        msgEnvio.innerHTML   = "Faça login para salvar seus resultados."
        msgEnvio.style.color = "orange"
        return // interrompe sem fazer o fetch
    }

    msgEnvio.innerHTML = "Salvando resultados..."

    // Payload exato esperado pela rota POST /quiz/cadastrar
    // O back-end fará um INSERT para cada item de `respostas`:
    //
    //   INSERT INTO respostas (usuario_id, questao_id, alternativa_id)
    //   VALUES (?, ?, ?)
    //
    // A UNIQUE KEY (usuario_id, questao_id) do banco impede duplicatas.
    const payload = {
        usuario_id: usuarioId,         // usuarios.id  ← vem do localStorage
        respostas:  respostasParaEnviar // [{ questao_id, alternativa_id }, ...]
    }

    try {
        const response = await fetch('/quiz/cadastrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })

        if (response.ok) {
            msgEnvio.innerHTML   = "Resultados salvos com sucesso!"
            msgEnvio.style.color = "green"
        } else {
            const errorText = await response.text()
            console.error('Erro do servidor:', errorText)
            msgEnvio.innerHTML   = `Erro ${response.status}: ${response.statusText}`
            msgEnvio.style.color = "red"
        }
    } catch (error) {
        // Falha de rede ou servidor fora do ar
        console.error('Falha na requisição:', error)
        msgEnvio.innerHTML   = "Não foi possível conectar ao servidor."
        msgEnvio.style.color = "red"
    }
}
</script>
